<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Platformer Level Editor</title><link rel="stylesheet" href="editor.css"></head><body><h1>Platformer Level Editor</h1><div class="toolbar"><button id="toolPlatform" class="active">Platform</button><button id="toolSpike">Spike</button><button id="toolResize">Resize</button><button id="toolDelete">Delete</button><label style="margin-left:10px; font-size:14px;"><input type="checkbox" id="snapToggle"> Snap-to-grid</label><label style="margin-left:8px; font-size:14px;">Grid: <input id="gridSize" type="number" value="10" min="2" style="width:60px"></label></div><div class="level-buttons"><button id="prevLevel">Prev Level</button><span id="levelLabel">Level 1</span><button id="nextLevel">Next Level</button><button id="addLevel">Add Level</button></div><div class="download-btn"><button id="downloadLevel">Download level.js</button></div><canvas id="editorCanvas" width="800" height="400"></canvas><p>Click canvas to place objects. Drag to move. Use <strong>Resize</strong> and drag a handle to resize. Use arrow keys to nudge. Hold <strong>Shift</strong> while resizing to lock aspect ratio.</p><div id="hud" class="hud" style="display:none"></div><script src="../level.js"></script><script src="editor.js"></script></body></html>
